services:
    back-dev:
        build: ./backend
        command: uv run uvicorn main:app --host 0.0.0.0 --reload --port ${BACKEND_PORT:-5000}
        volumes:
            - ./backend:/app
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - "${BACKEND_PORT:-5000}:${BACKEND_PORT:-5000}"
        env_file:
            - .env
        depends_on:
            - db
            - redis

    db:
        image: postgres:17
        volumes:
            - db_data:/var/lib/postgresql/data
        environment:
            POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD:-postgres}
            POSTGRES_USER: ${SUPABASE_DB_USER:-postgres}
            POSTGRES_DB: ${SUPABASE_DB_NAME:-postgres}
        ports:
            - "${DB_PORT:-5432}:5432"

    redis:
        image: redis:7
        ports:
            - "${REDIS_PORT:-6379}:6379"
        env_file:
            - .env

    front-dev:
        build: ./frontend
        command: npm run dev -- --host --port ${FRONTEND_PORT:-5173}
        volumes:
            - ./frontend:/app
            - /app/node_modules
        ports:
            - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
        depends_on:
            - back-dev
        env_file:
            - .env

    prod:
        build: .
        env_file:
            - .env
        extra_hosts:
            - "host.docker.internal:host-gateway"
        environment:
            URL_BACKEND: http://127.0.0.1:${BACKEND_PORT:-5000}
        ports:
            - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
            - "${BACKEND_PORT:-5000}:${BACKEND_PORT:-5000}"

volumes:
    db_data: